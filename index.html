<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#7a4a2d">
  <title>Matzah Run Mobile</title>
  <style>
    :root {
      --ui-bg: rgba(0, 0, 0, 0.28);
      --ui-border: rgba(255, 255, 255, 0.18);
      --ui-text: #ffffff;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #111;
      color: var(--ui-text);
      font-family: Arial, sans-serif;
      touch-action: none;
    }

    body {
      position: fixed;
      inset: 0;
    }

    #app {
      position: fixed;
      inset: 0;
      overflow: hidden;
      background: #111;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
    }

    .topbar {
      position: fixed;
      top: env(safe-area-inset-top, 0);
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      pointer-events: none;
      z-index: 10;
      padding: 10px 14px 0;
    }

    .chip {
      pointer-events: auto;
      background: var(--ui-bg);
      border: 1px solid var(--ui-border);
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 14px;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }

    .controls {
      position: fixed;
      left: 0;
      right: 0;
      bottom: env(safe-area-inset-bottom, 0);
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      padding: 14px 16px 18px;
      z-index: 11;
      pointer-events: none;
    }

    .dpad, .actions {
      display: flex;
      gap: 12px;
      pointer-events: auto;
    }

    .btn {
      user-select: none;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.12);
      color: white;
      border-radius: 18px;
      min-width: 74px;
      min-height: 74px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 700;
      box-shadow: 0 8px 24px rgba(0,0,0,0.22);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }

    .btn:active, .btn.pressed {
      transform: scale(0.97);
      background: rgba(255,255,255,0.2);
    }

    .btn.jump {
      min-width: 96px;
      min-height: 96px;
      border-radius: 999px;
      font-size: 18px;
      padding: 0 12px;
    }

    .hint {
      position: fixed;
      bottom: calc(env(safe-area-inset-bottom, 0) + 120px);
      left: 50%;
      transform: translateX(-50%);
      z-index: 9;
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      padding: 8px 12px;
      font-size: 13px;
      text-align: center;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      pointer-events: none;
    }

    @media (min-width: 900px) {
      .btn { min-width: 82px; min-height: 82px; }
      .btn.jump { min-width: 110px; min-height: 110px; }
    }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="game"></canvas>

    <div class="topbar">
      <div class="chip" id="statusChip">Tap anywhere to begin</div>
    </div>

    <div class="hint" id="hintBox">Playable on iPhone. Use touch controls below.</div>

    <div class="controls">
      <div class="dpad">
        <div class="btn" id="leftBtn">◀</div>
        <div class="btn" id="rightBtn">▶</div>
      </div>
      <div class="actions">
        <div class="btn jump" id="jumpBtn">JUMP</div>
      </div>
    </div>
  </div>

<script>

        { x: 2920, y: 60, w: 170, h: 14 }
      ],
      goal: { x: 3035, y: 22, w: 34, h: 26 }
    }
  ];

  const frogLayouts = [
    [{ x: 760, phase: 0.0, size: 1.0 }, { x: 1680, phase: 1.0, size: 1.15 }, { x: 2480, phase: 2.0, size: 0.95 }],
    [{ x: 700, phase: 0.4, size: 1.0 }, { x: 1490, phase: 1.5, size: 1.1 }, { x: 2380, phase: 2.2, size: 1.0 }],
    [{ x: 930, phase: 0.2, size: 1.0 }, { x: 1810, phase: 1.3, size: 1.1 }, { x: 2610, phase: 2.1, size: 0.9 }],
    [{ x: 1040, phase: 0.6, size: 1.0 }, { x: 1860, phase: 1.6, size: 1.05 }, { x: 2685, phase: 2.6, size: 0.95 }],
    [{ x: 860, phase: 0.8, size: 1.0 }, { x: 1590, phase: 1.8, size: 1.1 }, { x: 2440, phase: 2.8, size: 0.95 }]
  ];

  function resizeCanvas() {
    const dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
    const w = window.innerWidth;
    const h = window.innerHeight;
    canvas.width = Math.floor(w * dpr);
    canvas.height = Math.floor(h * dpr);
    canvas.style.width = w + 'px';
    canvas.style.height = h + 'px';
    scaleX = canvas.width / BASE_W;
    scaleY = canvas.height / BASE_H;
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.scale(scaleX, scaleY);
  }

  function setStatus(text) {
    statusChip.textContent = text;
  }

  function setHint(text, visible) {
    hintBox.textContent = text;
    hintBox.style.display = visible ? 'block' : 'none';
  }

  function setButtonState(btn, pressed) {
    if (pressed) btn.classList.add('pressed');
    else btn.classList.remove('pressed');
  }

  function bindTouchButton(btn, keyName) {
    function press(ev) {
      ev.preventDefault();
      keys[keyName] = true;
      setButtonState(btn, true);
    }
    function release(ev) {
      ev.preventDefault();
      keys[keyName] = false;
      setButtonState(btn, false);
    }
    btn.addEventListener('pointerdown', press);
    btn.addEventListener('pointerup', release);
    btn.addEventListener('pointercancel', release);
    btn.addEventListener('pointerleave', function () {
      if (keyName !== 'jump') return;
      keys[keyName] = false;
      setButtonState(btn, false);
    });
  }

  function playTone(freq, startTime, duration, type, volume) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.frequency.setValueAtTime(freq, startTime);
    osc.type = type;
    gain.gain.setValueAtTime(0.0001, startTime);
    gain.gain.linearRampToValueAtTime(volume, startTime + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, startTime + duration);
    osc.start(startTime);
    osc.stop(startTime + duration + 0.02);
  }

  function playDrum(startTime, isAccent) {
    if (!audioCtx) return;
    const bufferSize = Math.max(1, Math.floor(audioCtx.sampleRate * 0.12));
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i += 1) {
      data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, isAccent ? 2.2 : 3.4);
    }
    const src = audioCtx.createBufferSource();
    const filter = audioCtx.createBiquadFilter();
    const gain = audioCtx.createGain();
    src.buffer = buffer;
    filter.type = 'lowpass';
    filter.frequency.value = isAccent ? 180 : 500;
    gain.gain.value = isAccent ? 0.09 : 0.035;
    src.connect(filter);
    filter.connect(gain);
    gain.connect(audioCtx.destination);
    src.start(startTime);
  }

  function playMusic() {
    if (!audioCtx || musicStarted) return;
    musicStarted = true;
    const scale = [293.66, 311.13, 369.99, 392.0, 440.0, 466.16, 523.25];
    const melody = [0,1,2,1,0,4,3,2,1,2,4,3,2,1,0,6,4,3,2,1,0,1,2,4,3,2,1,0,4,2,1,0];
    const durations = [0.22,0.18,0.22,0.18,0.28,0.22,0.18,0.32];
    let step = 0;

    setInterval(function () {
      const now = audioCtx.currentTime;
      const note = scale[melody[step % melody.length]];
      const dur = durations[step % durations.length];
      playTone(note, now, dur, 'triangle', 0.05);
      if (step % 4 === 2) playTone(note * 2, now + 0.03, dur * 0.55, 'sine', 0.018);
      if (step % 8 === 5) playTone(scale[0] * 1.5, now, dur * 0.9, 'sawtooth', 0.012);
      playDrum(now, step % 4 === 0);
      if (step % 4 === 2) playDrum(now + 0.08, false);
      step += 1;
    }, 260);

    setInterval(function () {
      const now = audioCtx.currentTime;
      playTone(scale[0] / 2, now, 1.2, 'sine', 0.02);
      playTone(scale[4] / 2, now + 0.2, 0.9, 'triangle', 0.01);
    }, 1100);
  }

  function rectsOverlap(a, b) {
    return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
  }

  function playerRect() {
    return { x: player.x, y: player.y, w: player.w, h: player.h };
  }

  function goalRect(goal) {
    return { x: goal.x, y: goal.y, w: goal.w, h: goal.h };
  }

  function resetFrogs() {
    frogs.length = 0;
    const layout = frogLayouts[currentLevel] || [];
    for (let i = 0; i < layout.length; i += 1) {
      const f = layout[i];
      frogs.push({
        x: f.x,
        baseY: WATER_Y - 18,
        y: WATER_Y - 18,
        phase: f.phase,
        size: f.size,
        w: 34 * f.size,
        h: 24 * f.size,
        jumpHeight: 110 + 18 * f.size
      });
    }
  }

  function resetHazards() {
    hail.length = 0;
    resetFrogs();
  }

  function resetPlayer() {
    const start = levels[currentLevel].start;
    player.x = start.x;
    player.y = start.y;
    player.vx = 0;
    player.vy = 0;
    player.onGround = false;
    player.facing = 1;
    camera.x = Math.max(0, Math.min(WORLD_WIDTH - BASE_W, player.x - BASE_W * 0.35));
  }

  function levelReset() {
    resetPlayer();
    resetHazards();
    redWaterAmount = 0;
  }

  function resetGame() {
    currentLevel = 0;
    gameWon = false;
    gameState = 'title';
    storyTick = 0;
    redWaterAmount = 0;
    resetPlayer();
    resetHazards();
  }

  function nextLevel() {
    currentLevel += 1;
    redWaterAmount = 0;
    if (currentLevel >= levels.length) {
      gameWon = true;
      gameState = 'win';
      currentLevel = levels.length - 1;
    } else {
      resetPlayer();
      resetHazards();
    }
  }

  function update() {
    if (gameState === 'story') {
      storyTick += 1;
      return;
    }

    if (gameState !== 'game') return;

    redWaterAmount += 0.00035;
    if (redWaterAmount > 1) redWaterAmount = 1;

    if (Math.random() < 0.012) {
      hail.push({
        x: camera.x + 40 + Math.random() * (BASE_W - 80),
        y: -10,
        vy: 4 + Math.random() * 2,
        size: 4 + Math.random() * 3
      });
    }

    const level = levels[currentLevel];
    const left = keys.left;
    const right = keys.right;
    const jump = keys.jump;

    if (left) {
      player.vx -= MOVE_ACCEL;
      player.facing = -1;
    }
    if (right) {
      player.vx += MOVE_ACCEL;
      player.facing = 1;
    }

    if (!left && !right) {
      player.vx *= FRICTION;
      if (Math.abs(player.vx) < 0.05) player.vx = 0;
    }

    if (player.vx > MOVE_SPEED) player.vx = MOVE_SPEED;
    if (player.vx < -MOVE_SPEED) player.vx = -MOVE_SPEED;

    if (jump && player.onGround) {
      player.vy = JUMP_SPEED;
      player.onGround = false;
      keys.jump = false;
    }

    player.vy += GRAVITY;
    player.x += player.vx;
    player.y += player.vy;
    player.onGround = false;

    for (let i = 0; i < level.platforms.length; i += 1) {
      const p = level.platforms[i];
      const wasAbove = player.y + player.h - player.vy <= p.y + 1;
      const overlaps = player.x + player.w > p.x && player.x < p.x + p.w && player.y + player.h > p.y && player.y < p.y + p.h;
      if (overlaps && player.vy >= 0 && wasAbove) {
        player.y = p.y - player.h;
        player.vy = 0;
        player.onGround = true;
      }
    }

    for (let i = 0; i < frogs.length; i += 1) {
      const frog = frogs[i];
      frog.phase += 0.06;
      frog.y = frog.baseY - Math.abs(Math.sin(frog.phase)) * frog.jumpHeight;
      const hitbox = {
        x: frog.x + frog.w * 0.1,
        y: frog.y + frog.h * 0.18,
        w: frog.w * 0.8,
        h: frog.h * 0.75
      };
      if (rectsOverlap(playerRect(), hitbox)) {
        levelReset();
        return;
      }
    }

    for (let i = hail.length - 1; i >= 0; i -= 1) {
      const h = hail[i];
      h.y += h.vy;
      if (rectsOverlap(playerRect(), { x: h.x - h.size, y: h.y - h.size, w: h.size * 2, h: h.size * 2 })) {
        levelReset();
        return;
      }
      if (h.y > WATER_Y || h.y > BASE_H + 20) {
        hail.splice(i, 1);
      }
    }

    if (player.x < -40) player.x = -40;
    if (player.x + player.w > WORLD_WIDTH + 40) player.x = WORLD_WIDTH + 40 - player.w;

    if (player.y > BASE_H + 90) {
      levelReset();
      return;
    }

    if (rectsOverlap(playerRect(), goalRect(level.goal))) {
      nextLevel();
      return;
    }

    const targetCameraX = player.x - BASE_W * 0.35;
    camera.x += (targetCameraX - camera.x) * 0.12;
    if (camera.x < 0) camera.x = 0;
    const maxCamera = WORLD_WIDTH - BASE_W;
    if (camera.x > maxCamera) camera.x = maxCamera;
  }

  function drawPyramid(x, baseY, halfW, topY, leftColor, rightColor, shift) {
    const sx = x - shift;
    ctx.fillStyle = leftColor;
    ctx.beginPath();
    ctx.moveTo(sx - halfW, baseY);
    ctx.lineTo(sx, topY);
    ctx.lineTo(sx, baseY);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = rightColor;
    ctx.beginPath();
    ctx.moveTo(sx, topY);
    ctx.lineTo(sx + halfW, baseY);
    ctx.lineTo(sx, baseY);
    ctx.closePath();
    ctx.fill();
  }

  function drawBackground() {
    const sky = ctx.createLinearGradient(0, 0, 0, BASE_H);
    sky.addColorStop(0, '#f7b267');
    sky.addColorStop(0.5, '#e76f51');
    sky.addColorStop(1, '#7a4a2d');
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, BASE_W, BASE_H);

    const bgShift = camera.x * 0.25;
    const duneShift = camera.x * 0.45;
    const nearShift = camera.x * 0.7;

    ctx.fillStyle = 'rgba(255,220,140,0.9)';
    ctx.beginPath();
    ctx.arc(150 - bgShift * 0.15, 120, 45, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = '#c98d4a';
    ctx.beginPath();
    ctx.moveTo(-500 - duneShift, 380);
    ctx.quadraticCurveTo(80 - duneShift, 300, 520 - duneShift, 370);
    ctx.quadraticCurveTo(1020 - duneShift, 430, 1520 - duneShift, 340);
    ctx.quadraticCurveTo(2020 - duneShift, 270, 2600 - duneShift, 380);
    ctx.lineTo(2600 - duneShift, WATER_Y);
    ctx.lineTo(-500 - duneShift, WATER_Y);
    ctx.closePath();
    ctx.fill();

    drawPyramid(900, 380, 150, 120, '#d8b26e', '#bf9756', bgShift);
    drawPyramid(650, 395, 100, 220, '#cfa662', '#b88949', bgShift);
    drawPyramid(1450, 390, 130, 160, '#d2ab68', '#b98d50', bgShift);
    drawPyramid(1850, 400, 110, 210, '#c9a15e', '#af8347', bgShift);
    drawPyramid(2350, 390, 140, 150, '#d8b26e', '#bf9756', bgShift);
    drawPyramid(2750, 400, 100, 220, '#cfa662', '#b88949', bgShift);

    ctx.fillStyle = '#e0b56d';
    ctx.beginPath();
    ctx.moveTo(-600 - nearShift, 470);
    ctx.quadraticCurveTo(-50 - nearShift, 410, 550 - nearShift, 470);
    ctx.quadraticCurveTo(1100 - nearShift, 530, 1650 - nearShift, 455);
    ctx.quadraticCurveTo(2200 - nearShift, 390, 2800 - nearShift, 470);
    ctx.quadraticCurveTo(3350 - nearShift, 530, 3900 - nearShift, 460);
    ctx.lineTo(3900 - nearShift, WATER_Y);
    ctx.lineTo(-600 - nearShift, WATER_Y);
    ctx.closePath();
    ctx.fill();

    const topR = Math.round(77 + (180 - 77) * redWaterAmount);
    const topG = Math.round(182 + (40 - 182) * redWaterAmount);
    const topB = Math.round(229 + (40 - 229) * redWaterAmount);
    const botR = Math.round(15 + (110 - 15) * redWaterAmount);
    const botG = Math.round(92 + (10 - 92) * redWaterAmount);
    const botB = Math.round(138 + (10 - 138) * redWaterAmount);
    const waterGrad = ctx.createLinearGradient(0, WATER_Y - 5, 0, BASE_H);
    waterGrad.addColorStop(0, 'rgb(' + topR + ',' + topG + ',' + topB + ')');
    waterGrad.addColorStop(1, 'rgb(' + botR + ',' + botG + ',' + botB + ')');
    ctx.fillStyle = waterGrad;
    ctx.fillRect(0, WATER_Y, BASE_W, BASE_H - WATER_Y);

    ctx.strokeStyle = 'rgba(255,255,255,0.55)';
    ctx.lineWidth = 2;
    for (let row = 0; row < 3; row += 1) {
      const y = WATER_Y + 8 + row * 12;
      ctx.beginPath();
      for (let x = -40; x <= BASE_W + 40; x += 24) {
        const waveX = x - ((camera.x * (0.9 + row * 0.05)) % 24);
        ctx.moveTo(waveX, y);
        ctx.quadraticCurveTo(waveX + 6, y - 4, waveX + 12, y);
        ctx.quadraticCurveTo(waveX + 18, y + 4, waveX + 24, y);
      }
      ctx.stroke();
    }
  }

  function drawPlatform(p) {
    const sx = p.x - camera.x;
    ctx.fillStyle = '#8f8f8f';
    ctx.fillRect(sx, p.y, p.w, p.h);
    ctx.fillStyle = '#b9b9b9';
    ctx.fillRect(sx, p.y, p.w, 4);
  }

  function drawMatzah(goal) {
    ctx.save();
    ctx.translate(goal.x - camera.x, goal.y);
    ctx.fillStyle = '#e7c98a';
    ctx.fillRect(0, 0, goal.w, goal.h);
    ctx.strokeStyle = '#c49d56';
    ctx.lineWidth = 2;
    ctx.strokeRect(0, 0, goal.w, goal.h);
    ctx.fillStyle = '#b78947';
    const holes = [[6,6],[14,8],[24,6],[10,15],[20,16],[28,14],[7,21],[17,22],[27,21]];
    for (let i = 0; i < holes.length; i += 1) {
      const hole = holes[i];
      ctx.beginPath();
      ctx.arc(hole[0], hole[1], 1.4, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  function drawStickFigure() {
    const px = player.x - camera.x;
    const py = player.y;
    const cx = px + player.w / 2;
    const dir = player.facing >= 0 ? 1 : -1;

    ctx.fillStyle = '#d9d2a6';
    ctx.beginPath();
    ctx.moveTo(cx - 7, py + 15);
    ctx.lineTo(cx + 7, py + 15);
    ctx.lineTo(cx + 10, py + 42);
    ctx.lineTo(cx - 10, py + 42);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = '#f2c7a5';
    ctx.beginPath();
    ctx.arc(cx, py + 8, 7, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = '#333';
    ctx.beginPath();
    ctx.arc(cx, py + 6, 7.5, Math.PI, 0);
    ctx.fill();

    ctx.beginPath();
    if (dir > 0) {
      ctx.moveTo(cx - 6, py + 8);
      ctx.lineTo(cx - 8, py + 18);
      ctx.lineTo(cx - 4, py + 18);
    } else {
      ctx.moveTo(cx + 6, py + 8);
      ctx.lineTo(cx + 8, py + 18);
      ctx.lineTo(cx + 4, py + 18);
    }
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = '#eee';
    ctx.beginPath();
    ctx.moveTo(cx - 4, py + 10);
    ctx.lineTo(cx + 4, py + 10);
    ctx.lineTo(cx + 2, py + 20);
    ctx.lineTo(cx - 2, py + 20);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.arc(cx + 2 * dir, py + 7, 1.2, 0, Math.PI * 2);
    ctx.fill();

    ctx.strokeStyle = '#8b5a2b';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(cx + 12 * dir, py + 10);
    ctx.lineTo(cx + 12 * dir, py + 42);
    ctx.stroke();

    ctx.strokeStyle = '#d9d2a6';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(cx + 4 * dir, py + 22);
    ctx.lineTo(cx + 12 * dir, py + 20);
    ctx.stroke();

    ctx.strokeStyle = '#444';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(cx - 3, py + 42);
    ctx.lineTo(cx - 6, py + 50);
    ctx.moveTo(cx + 3, py + 42);
    ctx.lineTo(cx + 6, py + 50);
    ctx.stroke();
  }

  function drawFrog(frog) {
    const sx = frog.x - camera.x;
    const sy = frog.y;
    const w = frog.w;
    const h = frog.h;
    const eyeY = sy + h * 0.22;
    const bodyY = sy + h * 0.55;

    ctx.save();
    if (sy + h > WATER_Y) {
      ctx.beginPath();
      ctx.rect(0, 0, BASE_W, WATER_Y);
      ctx.clip();
    }

    ctx.strokeStyle = '#2c6b2f';
    ctx.lineWidth = 4;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(sx + w * 0.22, sy + h * 0.72);
    ctx.lineTo(sx + w * 0.06, sy + h * 1.02);
    ctx.lineTo(sx + w * 0.22, sy + h * 0.9);
    ctx.moveTo(sx + w * 0.78, sy + h * 0.72);
    ctx.lineTo(sx + w * 0.94, sy + h * 1.02);
    ctx.lineTo(sx + w * 0.78, sy + h * 0.9);
    ctx.stroke();

    ctx.fillStyle = '#4d9f42';
    ctx.beginPath();
    ctx.ellipse(sx + w * 0.5, bodyY, w * 0.34, h * 0.28, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = '#66bb57';
    ctx.beginPath();
    ctx.ellipse(sx + w * 0.5, sy + h * 0.42, w * 0.28, h * 0.23, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = '#9bd37f';
    ctx.beginPath();
    ctx.ellipse(sx + w * 0.5, sy + h * 0.62, w * 0.2, h * 0.14, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.strokeStyle = '#3f8f3f';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(sx + w * 0.38, sy + h * 0.68);
    ctx.lineTo(sx + w * 0.3, sy + h * 0.95);
    ctx.moveTo(sx + w * 0.62, sy + h * 0.68);
    ctx.lineTo(sx + w * 0.7, sy + h * 0.95);
    ctx.stroke();

    ctx.fillStyle = '#76c865';
    ctx.beginPath();
    ctx.arc(sx + w * 0.33, eyeY, w * 0.1, 0, Math.PI * 2);
    ctx.arc(sx + w * 0.67, eyeY, w * 0.1, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(sx + w * 0.33, eyeY, w * 0.06, 0, Math.PI * 2);
    ctx.arc(sx + w * 0.67, eyeY, w * 0.06, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = '#111';
    ctx.beginPath();
    ctx.arc(sx + w * 0.33, eyeY, w * 0.028, 0, Math.PI * 2);
    ctx.arc(sx + w * 0.67, eyeY, w * 0.028, 0, Math.PI * 2);
    ctx.fill();

    ctx.strokeStyle = '#2c6b2f';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.quadraticCurveTo(sx + w * 0.5, sy + h * 0.58, sx + w * 0.7, sy + h * 0.5);
    ctx.stroke();

    ctx.restore();

    if (Math.abs(sy + h - WATER_Y) < 18) {
      ctx.strokeStyle = 'rgba(255,255,255,0.6)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(sx + w * 0.5, WATER_Y + 2, w * 0.45, Math.PI * 1.08, Math.PI * 1.92);
      ctx.stroke();
    }
  }

  function drawHail() {
    ctx.fillStyle = '#cfe9ff';
    for (let i = 0; i < hail.length; i += 1) {
      const h = hail[i];
      const sx = h.x - camera.x;
      ctx.beginPath();
      ctx.arc(sx, h.y, h.size, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawTitleScreen() {
    drawBackground();
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.fillRect(0, 0, BASE_W, BASE_H);
    ctx.textAlign = 'center';
    ctx.fillStyle = '#fff';
    ctx.font = '58px Arial';
    ctx.fillText('MATZAH RUN', BASE_W / 2, 170);
    ctx.font = '26px Arial';
    ctx.fillText('Ancient Egypt Platform Adventure', BASE_W / 2, 225);
    ctx.font = '20px Arial';
    ctx.fillText('Use the touch buttons on iPhone', BASE_W / 2, 320);
    ctx.fillText('Avoid frogs jumping from the water and occasional hail', BASE_W / 2, 355);
    ctx.fillText('Reach the matzah at the end of each course', BASE_W / 2, 390);
    ctx.font = '28px Arial';
    ctx.fillText('Tap anywhere to continue', BASE_W / 2, 480);
    ctx.textAlign = 'left';
  }

  function drawStoryScreen() {
    drawBackground();
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.fillRect(0, 0, BASE_W, BASE_H);
    ctx.textAlign = 'center';
    ctx.fillStyle = '#fff';

    const charsToShow = Math.min(STORY_FULL.length, Math.floor(storyTick / STORY_REVEAL_SPEED));
    const shown = STORY_FULL.slice(0, charsToShow).split('\n');

    ctx.font = '40px Arial';
    if (shown[0]) ctx.fillText(shown[0], BASE_W / 2, 180);
    ctx.font = '28px Arial';
    if (shown[1]) ctx.fillText(shown[1], BASE_W / 2, 260);
    if (shown[2]) ctx.fillText(shown[2], BASE_W / 2, 315);

    if (charsToShow >= STORY_FULL.length) {
      ctx.font = '22px Arial';
      ctx.fillText('Tap anywhere to begin', BASE_W / 2, 430);
    }

    ctx.textAlign = 'left';
  }

  function drawWinScreen() {
    drawBackground();
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(0, 0, BASE_W, BASE_H);
    ctx.textAlign = 'center';
    ctx.fillStyle = '#fff';
    ctx.font = '46px Arial';
    ctx.fillText('You got the matzah!', BASE_W / 2, 220);
    ctx.font = '28px Arial';
    ctx.fillText('You beat all the levels', BASE_W / 2, 275);
    ctx.font = '22px Arial';
    ctx.fillText('Tap anywhere to return to the title screen', BASE_W / 2, 330);
    ctx.textAlign = 'left';
  }

  function drawGameUI() {
    ctx.fillStyle = '#fff';
    ctx.font = '20px Arial';
    ctx.fillText('Level ' + (currentLevel + 1) + ' / ' + levels.length, 20, 32);
    ctx.font = '16px Arial';
    ctx.fillText('Avoid frogs and falling hail', 20, 56);
    ctx.fillText('Distance: ' + Math.floor(player.x) + ' / ' + WORLD_WIDTH, 20, 80);
  }

  function drawGame() {
    drawBackground();
    drawHail();
    const level = levels[currentLevel];
    for (let i = 0; i < level.platforms.length; i += 1) {
      const p = level.platforms[i];
      if (p.x + p.w >= camera.x - 40 && p.x <= camera.x + BASE_W + 40) {
        drawPlatform(p);
      }
    }
    for (let i = 0; i < frogs.length; i += 1) {
      const frog = frogs[i];
      if (frog.x + frog.w >= camera.x - 60 && frog.x <= camera.x + BASE_W + 60) {
        drawFrog(frog);
      }
    }
    drawMatzah(level.goal);
    drawStickFigure();
    drawGameUI();
  }

  function draw() {
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.setTransform(scaleX, 0, 0, scaleY, 0, 0);

    if (gameState === 'title') {
      drawTitleScreen();
    } else if (gameState === 'story') {
      drawStoryScreen();
    } else if (gameState === 'win') {
      drawWinScreen();
    } else {
      drawGame();
    }
  }

  function advanceState() {
    if (gameState === 'title') {
      storyTick = 0;
      gameState = 'story';
      setStatus('Story');
      setHint('', false);
      if (audioCtx) {
        audioCtx.resume().then(function () { playMusic(); }).catch(function () {});
      }
      return;
    }

    if (gameState === 'story') {
      if (storyTick < STORY_FULL.length * STORY_REVEAL_SPEED) {
        storyTick = STORY_FULL.length * STORY_REVEAL_SPEED;
        return;
      }
      gameState = 'game';
      setStatus('Level ' + (currentLevel + 1));
      setHint('', false);
      return;
    }

    if (gameState === 'win') {
      resetGame();
      setStatus('Tap anywhere to begin');
  setHint('Playable on iPhone. Use touch controls below.', true);
    }
  }

  document.addEventListener('keydown', function (e) {
    if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = true;
    if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = true;
    if (e.code === 'ArrowUp' || e.code === 'KeyW' || e.code === 'Space') keys.jump = true;

    if (gameState !== 'game' || gameState === 'win') {
      advanceState();
    }

    if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Space'].includes(e.code)) {
      e.preventDefault();
    }
  });

  document.addEventListener('keyup', function (e) {
    if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = false;
    if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = false;
    if (e.code === 'ArrowUp' || e.code === 'KeyW' || e.code === 'Space') keys.jump = false;
  });

  canvas.addEventListener('pointerdown', function () {
    if (gameState !== 'game') advanceState();
  });

  bindTouchButton(leftBtn, 'left');
  bindTouchButton(rightBtn, 'right');
  bindTouchButton(jumpBtn, 'jump');

  window.addEventListener('resize', resizeCanvas);
  window.addEventListener('orientationchange', function () {
    setTimeout(resizeCanvas, 50);
  });

  function runSelfTests() {
    console.assert(typeof setHint === 'function', 'setHint should exist');
    console.assert(typeof audioCtx !== 'undefined' || audioCtx === null, 'audio context should be initialized or null');
    console.assert(Array.isArray(levels) && levels.length === 5, 'levels should exist');
    console.assert(Array.isArray(frogLayouts) && frogLayouts.length === levels.length, 'frog layouts should match levels');
    console.assert(typeof playMusic === 'function', 'playMusic should exist');
    console.assert(typeof drawStoryScreen === 'function', 'drawStoryScreen should exist');
    console.assert(typeof resizeCanvas === 'function', 'resizeCanvas should exist');
    console.assert(WORLD_WIDTH > BASE_W, 'world should be wider than the base screen');
    console.assert(STORY_FULL.indexOf('\n') > -1, 'story text should contain escaped newline separators');
    console.assert(STORY_FULL.split('\n').length === STORY_LINES.length, 'story text should split into expected number of lines');
  }

  resizeCanvas();
  resetPlayer();
  resetHazards();
  runSelfTests();
  setStatus('Tap anywhere to begin');
  setHint('Playable on iPhone. Use touch controls below.', true);

  function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
  }

  loop();
}());
</script>
</body>
</html>
